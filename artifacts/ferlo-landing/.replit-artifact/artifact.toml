kind = "web"
previewPath = "/"
title = "FerLo"
version = "1.0.0"
id = "artifacts/ferlo-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21164

[services.development]
run = "pnpm --filter @workspace/ferlo-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ferlo-landing", "run", "build" ]
publicDir = "artifacts/ferlo-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21164"
BASE_PATH = "/"
